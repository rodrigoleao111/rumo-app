name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Cancela execuções antigas do mesmo ref quando um novo push chega
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Build + testes unitários (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configura Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build + testes unitários
        run: ./gradlew assembleDebug testDebugUnitTest --no-daemon

      - name: Publica relatório de testes JVM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/

  instrumented-tests:
    name: Testes instrumentados (emulador)
    runs-on: ubuntu-latest
    # Testes de UI Compose não rodam aqui (ver docs/guia-testes.md); estes cobrem
    # migrations, DAOs, NoteRepository e round-trip de export/import.
    steps:
      - uses: actions/checkout@v4

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configura Gradle
        uses: gradle/actions/setup-gradle@v4

      # O android-emulator-runner exige aceleração por hardware (KVM) no runner.
      - name: Habilita KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Testes instrumentados (API 34)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Publica relatório de testes instrumentados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTests/connected/
